services:
  - type: web
    name: wewannaparty
    runtime: node
    repo: https://github.com/shammahbarakawoah-stack/wewannaparty
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
      - key: FROM_NAME
        value: WeWannaParty
      - key: DOMAIN
        value: kolawewannaparty.onrender.com
